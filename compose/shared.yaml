services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
      PERSIST_DIRECTORY: /chroma/chroma
    networks:
      - portfolio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Cloudflare origin certs — uploaded to EC2 by deploy.sh, never in this repo
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - portfolio
    restart: unless-stopped

volumes:
  chromadb_data:

networks:
  portfolio:
    external: true
