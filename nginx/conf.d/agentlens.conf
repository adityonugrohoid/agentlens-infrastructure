server {
    listen 443 ssl;
    server_name agentlens.example.com;

    # Cloudflare origin certificate — upload to /etc/ssl/cloudflare/ before starting
    ssl_certificate     /etc/ssl/cloudflare/example.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/example.com.key;

    # Docker embedded DNS resolver for upstream name resolution
    resolver 127.0.0.11 valid=30s;
    set $upstream_gw        lens-gateway;
    set $upstream_portfolio portfolio-ui;

    # AgentLens API routes → lens-gateway
    location /console {
        proxy_pass http://$upstream_gw:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering  off;
        proxy_cache      off;
        proxy_read_timeout 300s;
    }

    location /query {
        proxy_pass http://$upstream_gw:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering  off;
        proxy_cache      off;
        proxy_read_timeout 300s;
    }

    location /documents {
        proxy_pass http://$upstream_gw:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering  off;
        proxy_cache      off;
        proxy_read_timeout 300s;
    }

    location /models {
        proxy_pass http://$upstream_gw:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering  off;
        proxy_cache      off;
        proxy_read_timeout 300s;
    }

    location /config {
        proxy_pass http://$upstream_gw:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering  off;
        proxy_cache      off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://$upstream_gw:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Portfolio (Next.js) — catch-all for root and all unmatched paths
    location / {
        proxy_pass http://$upstream_portfolio:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name agentlens.example.com;
    return 301 https://$host$request_uri;
}
